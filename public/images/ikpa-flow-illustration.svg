<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" role="img" aria-labelledby="title desc">
  <title id="title">IKPA Analytics Illustration</title>
  <desc id="desc">Dashboard analytics with chart bars and magnifying glass on a blue technology background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#073b7a"/>
      <stop offset=".52" stop-color="#06275a"/>
      <stop offset="1" stop-color="#021432"/>
    </linearGradient>
    <linearGradient id="panel" x1=".12" y1=".07" x2=".91" y2=".9">
      <stop offset="0" stop-color="#1d78d8"/>
      <stop offset=".5" stop-color="#0d4da2"/>
      <stop offset="1" stop-color="#06285f"/>
    </linearGradient>
    <linearGradient id="panelEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#77d7ff"/>
      <stop offset="1" stop-color="#0b4fb1"/>
    </linearGradient>
    <linearGradient id="cyanBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bdf3ff"/>
      <stop offset=".55" stop-color="#46bff8"/>
      <stop offset="1" stop-color="#1277d8"/>
    </linearGradient>
    <linearGradient id="redBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b51"/>
      <stop offset="1" stop-color="#f51f2b"/>
