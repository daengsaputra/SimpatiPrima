      <stop offset="1" stop-color="#f7a900"/>
    </linearGradient>
    <linearGradient id="glass" x1=".13" y1=".1" x2=".82" y2=".9">
      <stop offset="0" stop-color="#eafcff" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#72cfff" stop-opacity=".46"/>
      <stop offset="1" stop-color="#195ca8" stop-opacity=".25"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#00122d" flood-opacity=".48"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
